services:
  postgres:
    image: postgres:16-alpine
    container_name: courseflow-db
    environment:
      POSTGRES_USER: courseflow_user
      POSTGRES_PASSWORD: courseflow_pass
      POSTGRES_DB: courseflow
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init-schema.sql
      - ./seed-db.sql:/docker-entrypoint-initdb.d/02-seed-data.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U courseflow_user -d courseflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - courseflow-network
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: courseflow-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@courseflow.dev
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - courseflow-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  courseflow-network:
    driver: bridge
