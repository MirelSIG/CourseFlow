# Formato Alternativo para drawDB - YAML
# Copiar contenido y pegar en: https://drawdb.app

# Este es un formato de referencia para importar manualmente en drawDB
# si prefieres trabajar desde YAML en lugar de JSON

database:
  name: "CourseFlow"
  type: "PostgreSQL"
  version: "1.0"
  description: "Plataforma de Gestión de Cursos y Solicitudes"
  date: "2026-05-13"

tables:
  - id: "T1"
    name: "usuarios"
    x: 50
    y: 50
    fields:
      - id: "id_usuario"
        name: "id_usuario"
        type: "INT"
        pk: true
        ai: true
        nn: true
      - id: "nombre"
        name: "nombre"
        type: "VARCHAR(255)"
        nn: true
      - id: "email"
        name: "email"
        type: "VARCHAR(255)"
        nn: true
        unique: true
      - id: "contraseña"
        name: "contraseña"
        type: "VARCHAR(255)"
        nn: true
      - id: "rol"
        name: "rol"
        type: "ENUM('usuario','administrador')"
        nn: true
        default: "'usuario'"
      - id: "estado"
        name: "estado"
        type: "ENUM('activo','inactivo')"
        nn: true
        default: "'activo'"
      - id: "fecha_creacion"
        name: "fecha_creacion"
        type: "TIMESTAMP"
        nn: true
        default: "CURRENT_TIMESTAMP"

  - id: "T2"
    name: "cursos"
    x: 400
    y: 50
    fields:
      - id: "id_curso"
        name: "id_curso"
        type: "INT"
        pk: true
        ai: true
        nn: true
      - id: "nombre"
        name: "nombre"
        type: "VARCHAR(255)"
        nn: true
      - id: "descripcion"
        name: "descripcion"
        type: "TEXT"
      - id: "fecha_inicio"
        name: "fecha_inicio"
        type: "DATE"
        nn: true
      - id: "fecha_fin"
        name: "fecha_fin"
        type: "DATE"
        nn: true
      - id: "capacidad"
        name: "capacidad"
        type: "INT"
        nn: true
      - id: "capacidad_adicional"
        name: "capacidad_adicional"
        type: "INT"
        nn: true
        default: "0"
      - id: "estado"
        name: "estado"
        type: "ENUM('activo','inactivo','en_curso','finalizado')"
        nn: true
        default: "'activo'"
      - id: "visibilidad"
        name: "visibilidad"
        type: "ENUM('publica','privada')"
        nn: true
        default: "'publica'"
      - id: "fecha_creacion"
        name: "fecha_creacion"
        type: "TIMESTAMP"
        nn: true
        default: "CURRENT_TIMESTAMP"

  - id: "T3"
    name: "solicitudes"
    x: 200
    y: 300
    fields:
      - id: "id_solicitud"
        name: "id_solicitud"
        type: "INT"
        pk: true
        ai: true
        nn: true
      - id: "id_usuario"
        name: "id_usuario"
        type: "INT"
        nn: true
        fk: true
      - id: "id_curso"
        name: "id_curso"
        type: "INT"
        nn: true
        fk: true
      - id: "estado"
        name: "estado"
        type: "ENUM('pendiente','aceptado','rechazado','cancelado','no_presentado')"
        nn: true
        default: "'pendiente'"
      - id: "fecha_solicitud"
        name: "fecha_solicitud"
        type: "TIMESTAMP"
        nn: true
        default: "CURRENT_TIMESTAMP"
      - id: "fecha_respuesta"
        name: "fecha_respuesta"
        type: "TIMESTAMP"
      - id: "comentarios"
        name: "comentarios"
        type: "TEXT"

  - id: "T4"
    name: "lista_espera"
    x: 500
    y: 350
    fields:
      - id: "id_espera"
        name: "id_espera"
        type: "INT"
        pk: true
        ai: true
        nn: true
      - id: "id_usuario"
        name: "id_usuario"
        type: "INT"
        nn: true
        fk: true
      - id: "id_curso"
        name: "id_curso"
        type: "INT"
        nn: true
        fk: true
      - id: "id_solicitud"
        name: "id_solicitud"
        type: "INT"
        nn: true
        fk: true
      - id: "posicion"
        name: "posicion"
        type: "INT"
        nn: true
      - id: "fecha_inscripcion"
        name: "fecha_inscripcion"
        type: "TIMESTAMP"
        nn: true
        default: "CURRENT_TIMESTAMP"
      - id: "estado"
        name: "estado"
        type: "ENUM('en_espera','promovido','rechazado')"
        nn: true
        default: "'en_espera'"
      - id: "fecha_promocion"
        name: "fecha_promocion"
        type: "TIMESTAMP"

  - id: "T5"
    name: "auditoria"
    x: 50
    y: 500
    fields:
      - id: "id_auditoria"
        name: "id_auditoria"
        type: "INT"
        pk: true
        ai: true
        nn: true
      - id: "tabla"
        name: "tabla"
        type: "VARCHAR(100)"
        nn: true
      - id: "operacion"
        name: "operacion"
        type: "ENUM('INSERT','UPDATE','DELETE')"
        nn: true
      - id: "id_usuario"
        name: "id_usuario"
        type: "INT"
        fk: true
      - id: "datos_anteriores"
        name: "datos_anteriores"
        type: "JSON"
      - id: "datos_nuevos"
        name: "datos_nuevos"
        type: "JSON"
      - id: "fecha_operacion"
        name: "fecha_operacion"
        type: "TIMESTAMP"
        nn: true
        default: "CURRENT_TIMESTAMP"

relationships:
  - id: "R1"
    startTableId: "T1"
    endTableId: "T3"
    startFieldId: "id_usuario"
    endFieldId: "id_usuario"
    label: "realiza"
    cardinality: "one-to-many"
    action: "CASCADE"

  - id: "R2"
    startTableId: "T2"
    endTableId: "T3"
    startFieldId: "id_curso"
    endFieldId: "id_curso"
    label: "recibe"
    cardinality: "one-to-many"
    action: "CASCADE"

  - id: "R3"
    startTableId: "T1"
    endTableId: "T4"
    startFieldId: "id_usuario"
    endFieldId: "id_usuario"
    label: "espera"
    cardinality: "one-to-many"
    action: "CASCADE"

  - id: "R4"
    startTableId: "T2"
    endTableId: "T4"
    startFieldId: "id_curso"
    endFieldId: "id_curso"
    label: "tiene"
    cardinality: "one-to-many"
    action: "CASCADE"

  - id: "R5"
    startTableId: "T3"
    endTableId: "T4"
    startFieldId: "id_solicitud"
    endFieldId: "id_solicitud"
    label: "registra"
    cardinality: "one-to-many"
    action: "CASCADE"

  - id: "R6"
    startTableId: "T1"
    endTableId: "T5"
    startFieldId: "id_usuario"
    endFieldId: "id_usuario"
    label: "ejecuta"
    cardinality: "one-to-many"
    action: "SET NULL"

# Convenciones en drawDB:
# pk: true       = Primary Key
# fk: true       = Foreign Key
# ai: true       = Auto Increment
# nn: true       = NOT NULL
# unique: true   = UNIQUE
# default: valor = DEFAULT value
# action:        = ON DELETE action (CASCADE, SET NULL, RESTRICT, NO ACTION)
